<div class="screen">
  <div class="card pf-modal">
    <div class="logo"><app-logo [size]="52" /></div>
    <h1>{{ 'login.welcome' | t }}</h1>
    <p class="sub">{{ 'login.subtitle' | t }}</p>

    <form (ngSubmit)="submit()">
      <label class="pf-label">{{ 'login.username' | t }}</label>
      <input class="pf-input" name="username" [(ngModel)]="username" autocomplete="username" />

      <label class="pf-label" style="margin-top: 16px">{{ 'login.password' | t }}</label>
      <input
        class="pf-input"
        type="password"
        name="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        [placeholder]="'login.passwordPlaceholder' | t"
      />

      @if (error()) {
        <div class="err"><app-icon name="warning" [size]="15" /> {{ error() }}</div>
      }

      <button class="pf-btn pf-btn-primary full" type="submit" [disabled]="busy()">
        {{ busy() ? ('login.signingIn' | t) : ('login.signIn' | t) }}
        <app-icon name="arrow-right" [size]="16" />
      </button>
    </form>

    <div class="hint">{{ 'login.defaultCreds' | t }}: <b>admin</b> / <b>admin123</b></div>
    <div class="login-lang"><app-lang-switch /></div>
  </div>
</div>
