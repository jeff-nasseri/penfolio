name: Docker

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GitVersion needs full history

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        continue-on-error: true
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      # GitVersion drives the version; fall back to next-version if it ever
      # hiccups so a release is never blocked on versioning.
      - name: Resolve version
        id: ver
        run: |
          ASSEMBLY="${{ steps.gitversion.outputs.assemblySemVer }}"
          SEMVER="${{ steps.gitversion.outputs.semVer }}"
          [ -z "$ASSEMBLY" ] && ASSEMBLY="0.7.0.0"
          [ -z "$SEMVER" ] && SEMVER="0.7.0"
          echo "assembly=$ASSEMBLY" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "Resolved version: assemblySemVer=$ASSEMBLY semVer=$SEMVER"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.assembly }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.assembly }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.semver }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.assembly }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          git tag "v${{ steps.ver.outputs.semver }}" || true
          git push origin "v${{ steps.ver.outputs.semver }}" || true
